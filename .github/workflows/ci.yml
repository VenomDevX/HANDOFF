name: CI / Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Least Privilege Principle: Only grant the permissions absolutely required.
permissions: read-all

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # TruffleHog needs full history to scan accurately

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  dependency-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Run NPM Audit (High & Critical Only)
        # Fails the build if there are high/critical vulnerabilities.
        # Can be set to `continue-on-error: true` during initial rollout if desired.
        run: npm audit --audit-level=high

  # Runs independently of the security scans above (not `needs:` gated) so a
  # scan failure never hides build/test results — they're separate signals.
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Type Check / Build
        # Next.js build includes type checking by default
        run: npm run build
        env:
          # Fake keys just for build process (if required by next.config.mjs)
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock_anon_key"
          ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

      - name: Run Unit Tests
        run: npm run test
        env:
          ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

  # Boots a local (ephemeral, CI-only) Supabase stack and runs the full
  # tests/integration suite against it — migrations, API authorization,
  # cross-org isolation, private task visibility, onboarding, student
  # workspace creation, join-code validation, team capacity, and lifecycle
  # notification recipient-scope are all covered by this one command.
  # Never touches production Supabase/Gemini keys or real data.
  integration-tests:
    name: Integration Tests (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations and seed
        run: supabase db reset

      - name: Export local Supabase env vars
        # -o env quotes every value; $GITHUB_ENV treats quotes as literal
        # characters, so strip them before appending.
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            --override-name auth.service_role_key=SUPABASE_SECRET_KEY \
            | grep -E '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY|SUPABASE_SECRET_KEY)=' \
            | sed 's/="\(.*\)"$/=\1/' >> "$GITHUB_ENV"

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          TEST_USER_PASSWORD: "Password123!"
          ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

  # A small, fast smoke suite (7 critical journeys) that runs on every PR —
  # distinct from the full Playwright suite, which only runs nightly/on
  # manual dispatch (see full-regression.yml) to keep PR feedback fast.
  e2e-smoke:
    name: E2E Smoke Suite
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations and seed
        run: supabase db reset

      - name: Export local Supabase env vars
        # -o env quotes every value; $GITHUB_ENV treats quotes as literal
        # characters, so strip them before appending.
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            --override-name auth.service_role_key=SUPABASE_SECRET_KEY \
            | grep -E '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY|SUPABASE_SECRET_KEY)=' \
            | sed 's/="\(.*\)"$/=\1/' >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Smoke Suite
        run: npx playwright test tests/e2e/smoke.spec.ts
        env:
          TEST_USER_PASSWORD: "Password123!"
          ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
